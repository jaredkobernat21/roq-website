<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ROQ — Experience Home</title>
<meta name="description" content="ROQ — experience home. Your entire home in one premium app." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #171716;
    --bg-deep: #0D0D0C;
    --ink: #FFFFFF;
    --ink-dim: #A8A6A2;
    --ink-faint: #6B6966;
    --gold: #C8A882;
    --border: rgba(255,255,255,0.08);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }

  ::selection { background: var(--gold); color: #14110B; }

  /* ---------- Header ---------- */

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px clamp(24px, 5vw, 64px);
    mix-blend-mode: normal;
  }

  .logo-mark {
    width: 30px;
    height: 30px;
    display: block;
  }

  .logo-mark path {
    stroke: var(--ink);
    stroke-width: 8;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav-wrap {
    position: relative;
  }

  .nav-trigger {
    width: 40px;
    height: 40px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s var(--ease);
  }

  .nav-trigger:hover,
  .nav-trigger[aria-expanded="true"] {
    border-color: rgba(255,255,255,0.3);
  }

  .nav-trigger span {
    position: relative;
    width: 16px;
    height: 10px;
  }

  .nav-trigger span::before,
  .nav-trigger span::after,
  .nav-trigger span i {
    content: '';
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--ink-dim);
    transition: background 0.3s var(--ease);
  }

  .nav-trigger span::before { top: 0; }
  .nav-trigger span i { top: 50%; margin-top: -0.5px; display: block; }
  .nav-trigger span::after { bottom: 0; }

  .nav-trigger:hover span::before,
  .nav-trigger:hover span::after,
  .nav-trigger:hover span i {
    background: var(--ink);
  }

  .nav-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    min-width: 160px;
    background: rgba(10,14,20,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
  }

  .nav-menu.open {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .nav-menu a {
    display: block;
    padding: 12px 14px;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--ink-dim);
    border-radius: 8px;
    transition: background 0.2s var(--ease), color 0.2s var(--ease);
  }

  .nav-menu a:hover {
    background: rgba(255,255,255,0.06);
    color: var(--ink);
  }

  /* ---------- Hero ---------- */

  .hero {
    position: relative;
    height: 100vh;
    min-height: 640px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
  }

  /* Rotating photo loop: layers are injected by JS, one per image in
     heroImages.desktop / heroImages.mobile. Each layer crossfades in/out
     and holds a slow Ken Burns zoom while active. Add more photos by
     dropping files in /assets and adding their filenames to the arrays
     near the bottom of this file — no other changes needed. */
  .hero-bg-layer {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center 55%;
    opacity: 0;
    transform: scale(1);
    transition: opacity 0.5s var(--ease);
  }

  .hero-bg-layer.active {
    opacity: 1;
    animation: heroZoom 2.5s linear forwards;
  }

  @keyframes heroZoom {
    from { transform: scale(1); }
    to { transform: scale(1.06); }
  }

  .hero-scrim {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(10,10,9,0.45) 0%, rgba(10,10,9,0.2) 32%, rgba(10,10,9,0.5) 72%, rgba(13,13,12,0.92) 100%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0 clamp(24px, 5vw, 64px);
    text-align: center;
  }

  .hero-headline {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(40px, 9vw, 96px);
    line-height: 1.05;
    letter-spacing: 0.01em;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 1.1s var(--ease) 0.2s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Statement ---------- */

  .showcase {
    background: var(--bg);
    padding: clamp(80px, 14vh, 140px) 0 clamp(80px, 12vh, 120px);
    overflow: hidden;
  }

  .showcase-headline {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(32px, 6vw, 60px);
    line-height: 1.1;
    color: var(--ink);
    padding: 0 clamp(24px, 5vw, 64px);
    margin-bottom: clamp(40px, 6vw, 64px);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s var(--ease), transform 1s var(--ease);
  }

  .showcase-headline.in-view {
    opacity: 1;
    transform: translateY(0);
  }

  .showcase-carousel {
    width: 100%;
    overflow: hidden;
    padding-left: clamp(24px, 5vw, 64px);
  }

  .showcase-track {
    display: flex;
    gap: 20px;
    transition: transform 0.7s var(--ease);
  }

  .showcase-slide {
    flex: 0 0 auto;
    width: min(240px, 62vw);
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
  }

  .showcase-slide img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ---------- Close / CTA ---------- */

  .close {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px clamp(24px, 6vw, 64px);
    background: var(--bg-deep);
    border-top: 1px solid var(--border);
  }

  .close-orb-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
  }

  .close-orb {
    width: clamp(72px, 9vw, 96px);
    height: clamp(72px, 9vw, 96px);
    filter: drop-shadow(0 0 24px rgba(255,255,255,0.22));
  }

  .close-headline {
    font-family: 'Lora', serif;
    font-size: clamp(28px, 3.8vw, 46px);
    color: var(--ink);
    margin-bottom: 18px;
    max-width: 20ch;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.9s var(--ease) 0.1s, transform 0.9s var(--ease) 0.1s;
  }

  .close-sub {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink-dim);
    max-width: 40ch;
    margin-bottom: 44px;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.9s var(--ease) 0.2s, transform 0.9s var(--ease) 0.2s;
  }

  .close-orb-wrap.in-view,
  .close-headline.in-view,
  .close-sub.in-view,
  .waitlist-form.in-view {
    opacity: 1;
    transform: translateY(0);
  }

  .waitlist-form {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 440px;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.9s var(--ease) 0.3s, transform 0.9s var(--ease) 0.3s;
  }

  .waitlist-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 15px 22px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.25s var(--ease), background 0.25s var(--ease);
  }

  .waitlist-input::placeholder { color: var(--ink-faint); }

  .waitlist-input:focus {
    border-color: rgba(200,168,130,0.5);
    background: rgba(255,255,255,0.06);
  }

  .waitlist-btn {
    background: var(--ink);
    color: #14110B;
    border: none;
    border-radius: 30px;
    padding: 15px 26px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.25s var(--ease), transform 0.25s var(--ease);
  }

  .waitlist-btn:hover { background: var(--gold); }
  .waitlist-btn:active { transform: scale(0.97); }
  .waitlist-btn:disabled { opacity: 0.6; cursor: default; }

  .waitlist-msg {
    margin-top: 18px;
    font-size: 13px;
    color: var(--ink-dim);
    min-height: 18px;
  }

  .waitlist-msg.success { color: var(--gold); }
  .waitlist-msg.error { color: #C97A6A; }

  @media (max-width: 520px) {
    .waitlist-form { flex-direction: column; }
    .waitlist-btn { padding: 15px; }
  }

  /* ---------- Footer ---------- */

  footer {
    background: var(--bg-deep);
    padding: 48px clamp(24px, 5vw, 64px) 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }

  .footer-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .footer-left .logo-mark { width: 20px; height: 20px; opacity: 0.7; }
  .footer-left .logo-mark path { stroke: var(--ink-dim); }

  .footer-copy {
    font-size: 12px;
    color: var(--ink-faint);
  }

  .footer-links {
    display: flex;
    gap: 28px;
  }

  .footer-links a {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
    transition: color 0.2s var(--ease);
  }

  .footer-links a:hover { color: var(--ink-dim); }

  @media (prefers-reduced-motion: reduce) {
    .hero-bg-layer { animation: none !important; transition: none !important; }
    .hero-bg-layer.active { opacity: 1; }
    .hero-headline,
    .showcase-headline, .close-orb-wrap, .close-headline, .close-sub, .waitlist-form {
      animation: none !important;
      transition: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>

  <script>
    // ---------- Hero photo loop ----------
    // Add more photos any time: drop the file in /assets and add its
    // filename to the matching array below. Desktop and mobile can hold
    // different numbers of images and even totally different photos.
    const heroImages = {
      desktop: [
        'assets/ROQ 1.PNG',
        'assets/ROQ 2.PNG',
        'assets/ROQ 3.PNG',
        'assets/ROQ 4.PNG',
        'assets/ROQ 5.PNG',
        'assets/ROQ 6.PNG',
      ],
      mobile: [
        'assets/mobile-1.jpg',
        'assets/mobile-2.jpg',
        'assets/mobile-3.jpg',
        'assets/mobile-4.jpg',
        'assets/mobile-5.jpg',
        'assets/mobile-6.jpg',
      ],
    };

    (function initHeroLoop() {
      const isMobile = window.matchMedia('(max-width: 700px)').matches;
      const set = (isMobile && heroImages.mobile.length ? heroImages.mobile : heroImages.desktop);
      const heroBg = document.getElementById('heroBg');
      if (!heroBg || !set.length) return;

      const layers = set.map((src, i) => {
        const div = document.createElement('div');
        div.className = 'hero-bg-layer';
        div.style.backgroundImage = `url('${src}')`;
        if (i === 0) div.classList.add('active');
        heroBg.appendChild(div);
        return div;
      });

      if (layers.length < 2) return; // nothing to rotate through

      const HOLD_MS = 2000; // how long each photo stays fully visible
      let current = 0;

      setInterval(() => {
        const prev = current;
        current = (current + 1) % layers.length;
        layers[current].classList.add('active');
        // restart the zoom animation cleanly on the incoming layer
        layers[current].style.animation = 'none';
        void layers[current].offsetWidth;
        layers[current].style.animation = '';
        setTimeout(() => layers[prev].classList.remove('active'), 500);
      }, HOLD_MS);
    })();

    // ---------- Screenshot showcase carousel ----------
    (function initShowcase() {
      const track = document.getElementById('showcaseTrack');
      if (!track) return;
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const realSlides = Array.from(track.children);
      if (!realSlides.length) return;

      // Clone the first slide onto the end so the loop can reset invisibly.
      const clone = realSlides[0].cloneNode(true);
      track.appendChild(clone);

      if (reduceMotion) return; // leave it static on the first screenshot

      let index = 0;
      const total = realSlides.length;

      function slideStep() {
        const style = getComputedStyle(track);
        const gap = parseFloat(style.gap) || 0;
        return track.children[0].getBoundingClientRect().width + gap;
      }

      function goTo(i, animate) {
        track.style.transition = animate ? 'transform 0.7s cubic-bezier(0.16, 1, 0.3, 1)' : 'none';
        track.style.transform = `translateX(-${i * slideStep()}px)`;
      }

      // When the animated step onto the cloned first slide finishes, snap
      // back to the real first slide with no transition. Since the clone
      // is pixel-identical, the reset is invisible — and tying it to the
      // transition's actual end (rather than a guessed setTimeout) keeps
      // it from drifting out of sync and producing a visible chop.
      track.addEventListener('transitionend', (e) => {
        if (e.propertyName !== 'transform' || index !== total) return;
        index = 0;
        track.style.transition = 'none';
        void track.offsetWidth; // force reflow so 'none' commits before the jump
        track.style.transform = 'translateX(0px)';
      });

      const timer = setInterval(() => {
        index++;
        goTo(index, true);
      }, 2600);

      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => goTo(index, false), 120);
      });
    })();

    // ---------- Nav dropdown ----------
    const navTrigger = document.getElementById('navTrigger');
    const navMenu = document.getElementById('navMenu');

    navTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = navMenu.classList.toggle('open');
      navTrigger.setAttribute('aria-expanded', isOpen);
    });

    document.addEventListener('click', () => {
      navMenu.classList.remove('open');
      navTrigger.setAttribute('aria-expanded', 'false');
    });

    // ---------- Scroll reveal ----------
    const revealEls = [
      document.getElementById('showcaseHeadline'),
      document.getElementById('closeOrbWrap'),
      document.getElementById('closeHeadline'),
      document.getElementById('closeSub'),
      document.getElementById('waitlistForm'),
    ];

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
        }
      });
    }, { threshold: 0.4 });

    revealEls.forEach(el => el && observer.observe(el));

    // ---------- SLADE orb ----------
    // A small "living" particle sphere — same visual language as the SLADE
    // mark elsewhere in the app: a breathing, slowly rotating cluster of
    // shimmering white points rather than a static icon.
    (function initSladeOrb() {
      const canvas = document.getElementById('closeOrb');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const size = canvas.width;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      ctx.scale(dpr, dpr);

      const center = size / 2;
      const radius = size * 0.46;
      const count = Math.round(24 + size * 0.9);

      const particles = [];
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.55) * radius;
        particles.push({
          x: Math.cos(angle) * r,
          y: Math.sin(angle) * r,
          size: Math.random() * 1.6 + 0.7,
          phase: Math.random() * Math.PI * 2,
          speed: 0.0007 + Math.random() * 0.0012,
          minOpacity: 0.35,
          maxOpacity: 1,
        });
      }

      const breatheDuration = 3200; // ms, half-cycle
      const rotateDuration = 26000; // ms, full rotation
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function frame(t) {
        ctx.clearRect(0, 0, size, size);

        const breatheT = (t % (breatheDuration * 2)) / (breatheDuration * 2);
        const breathe = (Math.sin(breatheT * Math.PI * 2 - Math.PI / 2) + 1) / 2;
        const scale = 0.94 + breathe * (1.06 - 0.94);

        const rotateT = (t % rotateDuration) / rotateDuration;
        const rotation = rotateT * Math.PI * 2;

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);

        particles.forEach((p) => {
          const shimmer = (Math.sin(t * p.speed + p.phase) + 1) / 2;
          const opacity = p.minOpacity + shimmer * (p.maxOpacity - p.minOpacity);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${opacity})`;
          ctx.fill();
        });

        ctx.restore();
        if (!reduceMotion) requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    })();

    // ---------- Waitlist submit ----------
    // Fill these in with your actual Supabase project values before deploying.
    const SUPABASE_URL = 'https://pgcospvlhorcvssafjoo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_E8B6OF7rTmNhlEVvS36fiA_wewl5tER';

    const form = document.getElementById('waitlistForm');
    const emailInput = document.getElementById('waitlistEmail');
    const btn = document.getElementById('waitlistBtn');
    const msg = document.getElementById('waitlistMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Joining…';
      msg.textContent = '';
      msg.className = 'waitlist-msg';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({ email }),
        });

        if (res.ok) {
          msg.textContent = "You're on the list. Welcome home.";
          msg.className = 'waitlist-msg success';
          emailInput.value = '';
          btn.textContent = 'Experience Home';
        } else if (res.status === 409) {
          msg.textContent = "You're already on the list.";
          msg.className = 'waitlist-msg success';
          btn.textContent = 'Experience Home';
        } else {
          throw new Error('Request failed');
        }
      } catch (err) {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.className = 'waitlist-msg error';
        btn.textContent = 'Experience Home';
      } finally {
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
